services:
  db:
    image: mysql:8.0
    container_name: staylio-db
    environment:
      MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
      MYSQL_DATABASE: staylio_database
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
 
  backend:
    image: manojghadge133/staylio-backend:latest
    build:
      context: ./staylio-backend
      dockerfile: Dockerfile
    container_name: staylio-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/staylio_database
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: $MYSQL_ROOT_PASSWORD
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: jagdishbabalsure89@gmail.com
      SPRING_MAIL_PASSWORD: ctjskhqmseqpzqdv
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: true
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: true
    ports:
      - "$BACKEND_PORT:8080"
    depends_on:
      db:
        condition: service_healthy

  ai-agent:
    image: manojghadge133/staylio-ai-agent:latest
    build:
      context: ./staylio-ai-agent
      dockerfile: Dockerfile
    container_name: staylio-ai-agent
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: $MYSQL_ROOT_PASSWORD
      DB_NAME: staylio_database
    env_file:
      - ./staylio-ai-agent/config.env
    ports:
      - "${AI_AGENT_PORT}:5000"
    depends_on:
      db:
        condition: service_healthy
  
  frontend-user:
    image: manojghadge133/staylio-frontend-user:latest
    build:
      context: ./staylio
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: staylio-frontend-user
    ports:
      - "${FRONTEND_USER_PORT}:80"

  frontend-host:
    image: manojghadge133/staylio-frontend-host:latest
    build:
      context: ./staylio-host-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: staylio-frontend-host
    ports:
      - "${FRONTEND_HOST_PORT}:80"

  frontend-admin:
    image: manojghadge133/staylio-frontend-admin:latest
    build:
      context: ./staylio-admin-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: staylio-frontend-admin
    ports:
      - "${FRONTEND_ADMIN_PORT}:80"

volumes:
  db_data: